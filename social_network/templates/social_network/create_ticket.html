{% extends "social_network/base.html" %}
{% load django_bootstrap5 %}

{% block main %}
<h1>Créer un ticket</h1>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {% bootstrap_form form %}
    <button type="submit" class="btn btn-primary">Envoyer</button>
</form>

{% endblock %}
