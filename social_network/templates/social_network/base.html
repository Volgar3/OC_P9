{% extends "base.html" %}

{% block body %}
    <header class="d-flex justify-content-between align-items-center border-bottom">
        <div style="width: 265px;"></div>
        <h1 class="p-2">LitReview</h1>
        <nav>
            <a class="p-2">Flux</a>
            <a class="p-2">Posts</a>
            <a class="p-2">Abonnements</a>
            <form class="logout-form p-2" method="POST" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit" class="btn p-0 border-0 bg-transparent text-danger">
                    <i class="bi bi-power" style="font-size: 24px;"></i>
                </button>
            </form>
        </nav>
    </header>
    <main class="main">
        {% block main %}
        {% endblock %}
    </main>
{% endblock %}
